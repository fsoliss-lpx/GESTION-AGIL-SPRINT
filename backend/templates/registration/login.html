{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Módulo Ágil UNEMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/estilos_unemi.css' %}">
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow-lg border-0" style="width: 100%; max-width: 400px; border-radius: 10px; overflow: hidden;">
        <div class="card-header bg-unemi text-white text-center py-4 card-header-unemi">
            <h4 class="mb-1 fw-bold">Gestión Ágil</h4>
            <small class="text-white-50">Universidad Estatal de Milagro</small>
        </div>
        <div class="card-body p-4 bg-white">
            
            <div class="text-center mb-4">
                <h5 class="text-unemi-naranja fw-bold">Bienvenido</h5>
                <p class="text-muted small">Ingresa tus credenciales institucionales</p>
            </div>

            {% if form.errors %}
                <div class="alert alert-danger border-0 shadow-sm" role="alert">
                    Usuario o contraseña incorrectos. Por favor, intente de nuevo.
                </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="id_username" class="form-label fw-bold text-secondary">Usuario institucional</label>
                    <input type="text" name="username" class="form-control form-control-lg fs-6" id="id_username" required autofocus placeholder="Ej. usuario">
                </div>
                
                <div class="mb-4">
                    <label for="id_password" class="form-label fw-bold text-secondary">Contraseña</label>
                    <input type="password" name="password" class="form-control form-control-lg fs-6" id="id_password" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn btn-unemi w-100 fw-bold py-2 mb-2">Iniciar Sesión</button>
            </form>
            
        </div>
    </div>

</body>
</html>
